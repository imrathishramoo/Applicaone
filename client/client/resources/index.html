<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware License System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            border: 1px solid #e9ecef;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-group input:read-only {
            background-color: #f8f9fa;
            color: #6c757d;
            cursor: not-allowed;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #219a52 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
        }

        .result-section {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: #e8f4fd;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .license-display {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin-top: 15px;
            display: none;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .server-online {
            color: #27ae60;
            font-weight: bold;
        }

        .server-offline {
            color: #e74c3c;
            font-weight: bold;
        }

        .help-text {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group .btn {
            flex: 1;
        }

        /* Hide the entire system status card */
        .system-status-card {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>License System</h1>
        </div>

        <div class="content">
            <!-- System Status Card - Hidden but operations continue -->
            <div class="card system-status-card">
                <h2>System Status</h2>
                <div class="server-status">
                    <span>Server Status:</span>
                    <span id="server-status" class="server-offline">Checking...</span>
                </div>

                <div id="license-status" class="status-indicator status-inactive">
                    <i class="fas fa-times-circle"></i> No Active License
                </div>

                <div id="license-display" class="license-display">
                    <!-- License information will appear here -->
                </div>
            </div>

            <div class="card">
                <div class="info-box">
                    <strong>Gumroad License Activation</strong><br>
                    Enter your Gumroad Purchase ID and email to activate your license on this device.
                </div>

                <div class="form-group">
                    <input type="text" id="gumroad-purchase-id" placeholder="Enter your Gumroad Purchase ID">
                    <div class="help-text">Find this in your Gumroad receipt email or account page</div>
                </div>

                <div class="form-group">
                    <input type="email" id="gumroad-email" placeholder="Enter the email used for purchase">
                </div>

                <button id="activate-gumroad-btn" class="btn btn-success" disabled>
                    <i class="fas fa-key"></i> Generate License
                </button>

                <div class="form-group" style="margin-top: 20px;">
                    <label for="license-key">License Key</label>
                    <input type="text" id="license-key"
                        placeholder="Click 'Show License Key' to reveal your license key" readonly>
                </div>

                <div class="button-group">
                    <button id="show-license-btn" class="btn btn-info" style="display: none;">
                        <i class="fas fa-eye"></i> Show License Key
                    </button>
                </div>

                <div id="result-section" class="result-section"></div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing your request...</p>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const LICENSE_SERVER_URL = "http://localhost:3001";
        const IS_DEV_MODE = true;

        // ========== APPLICATION STATE ==========
        let globalLicenseStatus = {
            isValid: false,
            checked: false,
            hardwareBound: false,
            licenseKey: null,
            systemFingerprint: null
        };

        let hardwareSystem = null;
        let serverOnline = false;

        // ========== HARDWARE FINGERPRINT SYSTEM ==========
        class HardwareFingerprintSystem {
            constructor() {
                this.hardwareData = null;
                this.initialized = false;
            }

            async initialize() {
                try {
                    console.log("🔄 Initializing hardware system...");

                    if (typeof Neutralino !== 'undefined') {
                        await this.collectHardwareWithNeutralino();
                    } else {
                        this.collectHardwareWithBrowser();
                    }

                    this.initialized = true;
                    console.log("✅ Hardware system initialized");
                    return true;

                } catch (error) {
                    console.error('❌ Hardware initialization error:', error);
                    this.collectHardwareWithBrowser();
                    this.initialized = true;
                    return false;
                }
            }

            async collectHardwareWithNeutralino() {
                this.hardwareData = {
                    motherboardId: '',
                    processorId: '',
                    ramId: '',
                    macAddress: '',
                    systemUUID: '',
                    environment: 'Neutralino App'
                };

                try {
                    const memoryInfo = await Neutralino.computer.getMemoryInfo();
                    this.hardwareData.ramId = this.generateRamId(memoryInfo);

                    const osInfo = await Neutralino.computer.getOSInfo();
                    this.hardwareData.os = osInfo.name;

                    if (osInfo.name.toLowerCase().includes('windows')) {
                        await this.getWindowsHardwareInfo();
                    } else {
                        await this.getGenericHardwareInfo();
                    }

                } catch (error) {
                    console.error("Error collecting Neutralino hardware:", error);
                    throw error;
                }
            }

            collectHardwareWithBrowser() {
                this.hardwareData = {
                    motherboardId: 'mobo_browser',
                    processorId: `cpu_${navigator.hardwareConcurrency || 'unknown'}`,
                    ramId: `ram_${navigator.deviceMemory || 'unknown'}gb`,
                    macAddress: 'mac_browser',
                    systemUUID: 'uuid_browser',
                    environment: 'Web Browser',
                    os: 'Browser Environment'
                };
            }

            async getWindowsHardwareInfo() {
                try {
                    const uuidResult = await Neutralino.os.execCommand('wmic csproduct get uuid');
                    if (uuidResult.stdOut) {
                        const lines = uuidResult.stdOut.split('\n').filter(line => line.trim());
                        if (lines.length > 1) {
                            this.hardwareData.systemUUID = lines[1].trim();
                        }
                    }

                    const moboResult = await Neutralino.os.execCommand('wmic baseboard get serialnumber');
                    if (moboResult.stdOut) {
                        const lines = moboResult.stdOut.split('\n').filter(line => line.trim());
                        if (lines.length > 1) {
                            const serial = lines[1].trim();
                            if (serial && serial !== '0' && serial.length > 3) {
                                this.hardwareData.motherboardId = serial;
                            }
                        }
                    }

                    const cpuResult = await Neutralino.os.execCommand('wmic cpu get name');
                    if (cpuResult.stdOut) {
                        const lines = cpuResult.stdOut.split('\n').filter(line => line.trim());
                        if (lines.length > 1) {
                            this.hardwareData.processorId = lines[1].trim();
                        }
                    }

                } catch (error) {
                    console.warn("Error getting Windows hardware info:", error);
                }

                if (!this.hardwareData.systemUUID) this.hardwareData.systemUUID = 'uuid_unknown';
                if (!this.hardwareData.motherboardId) this.hardwareData.motherboardId = 'mobo_unknown';
                if (!this.hardwareData.processorId) this.hardwareData.processorId = 'cpu_unknown';
                if (!this.hardwareData.macAddress) this.hardwareData.macAddress = 'mac_unknown';
            }

            async getGenericHardwareInfo() {
                try {
                    const unameResult = await Neutralino.os.execCommand('uname -a');
                    if (unameResult.stdOut) {
                        this.hardwareData.systemUUID = unameResult.stdOut.trim();
                    }
                } catch (error) {
                    console.warn("Error getting generic hardware info:", error);
                }

                if (!this.hardwareData.systemUUID) this.hardwareData.systemUUID = 'uuid_unknown';
                if (!this.hardwareData.motherboardId) this.hardwareData.motherboardId = 'mobo_unknown';
                if (!this.hardwareData.processorId) this.hardwareData.processorId = 'cpu_unknown';
                if (!this.hardwareData.macAddress) this.hardwareData.macAddress = 'mac_unknown';
            }

            generateRamId(memoryInfo) {
                const total = memoryInfo.physicalMemory?.total || 0;
                return `ram_${Math.round(total / (1024 * 1024 * 1024))}gb`;
            }

            async generateSystemFingerprint() {
                if (!this.initialized) {
                    await this.initialize();
                }

                const components = [
                    this.hardwareData.motherboardId,
                    this.hardwareData.processorId,
                    this.hardwareData.ramId,
                    this.hardwareData.macAddress,
                    this.hardwareData.systemUUID
                ].filter(Boolean).join('|');

                let hash = 0;
                for (let i = 0; i < components.length; i++) {
                    const char = components.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }

                const fingerprint = Math.abs(hash).toString(36);
                console.log("🔧 Generated system fingerprint:", fingerprint);
                return fingerprint;
            }

            async getFormattedHardwareInfo() {
                if (!this.initialized) {
                    await this.initialize();
                }

                const fingerprint = await this.generateSystemFingerprint();

                return {
                    fingerprint: fingerprint,
                    motherboard: this.hardwareData.motherboardId,
                    processor: this.hardwareData.processorId,
                    ram: this.hardwareData.ramId,
                    mac: this.hardwareData.macAddress,
                    uuid: this.hardwareData.systemUUID,
                    environment: this.hardwareData.environment,
                    os: this.hardwareData.os
                };
            }
        }

        // ========== SERVER LICENSE INTEGRATION ==========
        async function testServerConnection() {
            try {
                // Try multiple endpoints to check server status
                const endpoints = ['/api/debug/data', '/admin', '/'];

                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(`${LICENSE_SERVER_URL}${endpoint}`);
                        if (response.ok) {
                            serverOnline = true;
                            console.log(`✅ Server is online (${endpoint})`);
                            return { success: true, endpoint: endpoint };
                        }
                    } catch (error) {
                        continue;
                    }
                }

                serverOnline = false;
                return { success: false, error: "All endpoints failed" };
            } catch (error) {
                serverOnline = false;
                return { success: false, error: error.message };
            }
        }

        async function checkLicenseInDatabase(licenseKey) {
            try {
                console.log("🔍 Checking if license exists in database...");

                const response = await fetch(`${LICENSE_SERVER_URL}/api/check-license`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        license_key: licenseKey
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.exists) {
                    console.log("✅ License found in database");
                    return true;
                } else {
                    console.log("❌ License NOT found in database");
                    return false;
                }
            } catch (error) {
                console.error("Error checking license in database:", error);
                return false;
            }
        }

        async function validateHardwareLicense(licenseKey) {
            try {
                // First check if license exists in database
                const licenseExists = await checkLicenseInDatabase(licenseKey);

                if (!licenseExists) {
                    console.log("❌ License not found in database - validation failed");
                    return false;
                }

                // If license exists in database, proceed with hardware validation
                const systemFingerprint = await hardwareSystem.generateSystemFingerprint();

                const response = await fetch(`${LICENSE_SERVER_URL}/api/validate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        licenseKey: licenseKey,
                        systemFingerprint: systemFingerprint
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.valid) {
                    globalLicenseStatus.isValid = true;
                    globalLicenseStatus.hardwareBound = true;
                    globalLicenseStatus.licenseKey = licenseKey;
                    globalLicenseStatus.systemFingerprint = systemFingerprint;
                    console.log("✅ License validated with server");

                    // Show the license key button when license is valid
                    document.getElementById('show-license-btn').style.display = 'block';
                    return true;
                } else {
                    console.log("❌ License validation failed:", result.error);
                    return false;
                }
            } catch (error) {
                console.error("License validation error:", error);
                return false;
            }
        }

        async function activateWithGumroad() {
            try {
                const purchaseId = document.getElementById('gumroad-purchase-id').value.trim();
                const email = document.getElementById('gumroad-email').value.trim();
                const systemFingerprint = await hardwareSystem.generateSystemFingerprint();

                console.log("🔧 Activating with Purchase ID:", purchaseId);
                console.log("🔧 Using system fingerprint:", systemFingerprint);

                const requestBody = {
                    gumroadPurchaseId: purchaseId,
                    gumroadEmail: email,
                    systemFingerprint: systemFingerprint,
                    purchaseQuantity: 1
                };

                console.log("🔧 Sending request body:", JSON.stringify(requestBody, null, 2));

                const response = await fetch(`${LICENSE_SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const result = await response.json();
                console.log("🔧 Server response:", result);

                if (result.success) {
                    globalLicenseStatus.isValid = true;
                    globalLicenseStatus.hardwareBound = true;
                    globalLicenseStatus.licenseKey = result.license_key;
                    globalLicenseStatus.systemFingerprint = systemFingerprint;

                    console.log("✅ License activated via server!");
                    return {
                        success: true,
                        license_key: result.license_key,
                        message: result.message,
                        product_name: result.product_name
                    };
                } else {
                    console.log("❌ Server activation failed:", result.error);
                    return {
                        success: false,
                        error: result.error || result.message || "Activation failed"
                    };
                }
            } catch (error) {
                console.error("Activation error:", error);
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        async function saveHardwareLicense(licenseKey, fingerprint) {
            try {
                const licenseData = {
                    key: licenseKey,
                    fingerprint: fingerprint,
                    timestamp: Date.now(),
                    appId: "warriors-artillery"
                };

                if (typeof Neutralino !== 'undefined' && Neutralino.storage) {
                    try {
                        await Neutralino.storage.setData('hardware_license', JSON.stringify(licenseData));
                    } catch (storageError) {
                        localStorage.setItem('hardware_license', JSON.stringify(licenseData));
                    }
                } else {
                    localStorage.setItem('hardware_license', JSON.stringify(licenseData));
                }
                return true;
            } catch (error) {
                console.error("Error saving hardware license:", error);
                return false;
            }
        }

        async function loadHardwareLicense() {
            try {
                let licenseData = null;

                if (typeof Neutralino !== 'undefined' && Neutralino.storage) {
                    try {
                        const neutralinoData = await Neutralino.storage.getData('hardware_license');
                        if (neutralinoData) {
                            licenseData = JSON.parse(neutralinoData);
                        }
                    } catch (e) {
                        console.warn("Neutralino storage failed");
                    }
                }

                if (!licenseData) {
                    const localData = localStorage.getItem('hardware_license');
                    if (localData) {
                        licenseData = JSON.parse(localData);
                    }
                }

                if (!licenseData || !licenseData.key) {
                    console.log("No license data found");
                    return false;
                }

                const isValid = await validateHardwareLicense(licenseData.key);

                if (isValid) {
                    globalLicenseStatus.isValid = true;
                    globalLicenseStatus.hardwareBound = true;
                    globalLicenseStatus.licenseKey = licenseData.key;
                    globalLicenseStatus.systemFingerprint = licenseData.fingerprint;
                    console.log("✅ License loaded and validated");

                    // Show the license key button when license is loaded and valid
                    document.getElementById('show-license-btn').style.display = 'block';
                    return true;
                } else {
                    console.log("❌ License validation failed");
                    return false;
                }

            } catch (error) {
                console.error("Error loading hardware license:", error);
                return false;
            }
        }

        // ========== UI FUNCTIONS ==========
        function showResult(message, type) {
            const resultSection = document.getElementById('result-section');
            resultSection.innerHTML = message;
            resultSection.className = `result-section result-${type}`;
            resultSection.style.display = 'block';
        }

        function showLoading(show) {
            const loadingElement = document.getElementById('loading');
            loadingElement.style.display = show ? 'block' : 'none';
        }

        function enableButtons() {
            document.getElementById('activate-gumroad-btn').disabled = false;
        }

        // ========== LICENSE ACTIVATION FUNCTIONS ==========
        async function handleActivation() {
            if (!serverOnline) {
                showResult("❌ Server is offline. Please start the license server first.", "error");
                return;
            }

            const purchaseId = document.getElementById('gumroad-purchase-id').value.trim();
            const email = document.getElementById('gumroad-email').value.trim();

            if (!purchaseId || !email) {
                showResult("Please enter both Purchase ID and Email", "error");
                return;
            }

            if (!email.includes('@')) {
                showResult("Please enter a valid email address", "error");
                return;
            }

            showLoading(true);
            const activateGumroadBtn = document.getElementById('activate-gumroad-btn');
            activateGumroadBtn.disabled = true;
            activateGumroadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Activating...';

            try {
                const result = await activateWithGumroad();

                if (result.success) {
                    await saveHardwareLicense(result.license_key, globalLicenseStatus.systemFingerprint);

                    let successMessage = `
                        <h3>✅ License Activated Successfully!</h3>
                        <p><strong>Purchase ID:</strong> ${purchaseId}</p>
                        <p><strong>Product:</strong> ${result.product_name || 'Unknown Product'}</p>
                        <p>${result.message}</p>
                        <p><em>Click "Show License Key" to reveal your license key.</em></p>
                    `;

                    showResult(successMessage, "success");

                    // Show the license key button after successful activation
                    document.getElementById('show-license-btn').style.display = 'block';
                } else {
                    showResult(`❌ Activation failed: ${result.error}`, "error");
                }

            } catch (error) {
                showResult(`❌ Error: ${error.message}`, "error");
            } finally {
                showLoading(false);
                activateGumroadBtn.disabled = false;
                activateGumroadBtn.innerHTML = '<i class="fas fa-key"></i> Activate License';
            }
        }

        function showLicenseKey() {
            if (globalLicenseStatus.licenseKey) {
                document.getElementById('license-key').value = globalLicenseStatus.licenseKey;
                showResult("✅ License key revealed. Make sure to save it securely!", "success");
            } else {
                showResult("❌ No license key available. Please activate a license first.", "error");
            }
        }

        // ========== INITIALIZATION ==========
        async function initializeApp() {
            try {
                console.log("🚀 Starting Hardware License System...");

                // Test server connection first (runs in background)
                await testServerConnection();

                if (typeof Neutralino !== 'undefined') {
                    Neutralino.events.on("ready", async () => {
                        console.log("✅ Neutralino ready!");

                        try {
                            hardwareSystem = new HardwareFingerprintSystem();
                            await hardwareSystem.initialize();

                            // Load and validate license (runs in background)
                            await loadHardwareLicense();

                            enableButtons();
                            console.log("✅ Application fully initialized");

                        } catch (error) {
                            console.error("Error during initialization:", error);
                        }
                    });

                    Neutralino.init();
                } else {
                    hardwareSystem = new HardwareFingerprintSystem();
                    await hardwareSystem.initialize();

                    // Load and validate license (runs in background)
                    await loadHardwareLicense();

                    enableButtons();
                }

            } catch (error) {
                console.error("❌ Failed to initialize app:", error);
            }
        }

        // ========== EVENT LISTENERS ==========
        window.addEventListener('load', () => {
            initializeApp();
            document.getElementById('activate-gumroad-btn').addEventListener('click', handleActivation);
            document.getElementById('show-license-btn').addEventListener('click', showLicenseKey);
        });
    </script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Neutralino client library -->
    <script src="js/neutralino.js"></script>
</body>

</html>
